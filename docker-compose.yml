services:
  postgres:
    image: postgres:16
    container_name: ions_postgres
    environment:
      POSTGRES_USER: ions
      POSTGRES_PASSWORD: ions
      POSTGRES_DB: ions
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ions"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: ions_api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data: